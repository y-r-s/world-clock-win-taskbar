name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        shell: powershell
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --collect-data tzdata --name WorldClock main.py

      - name: Package zip
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist\WorldClock.exe release\WorldClock.exe
          Compress-Archive -Path release\WorldClock.exe -DestinationPath release\WorldClock-${{ github.ref_name }}-windows.zip -Force

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: worldclock-${{ github.ref_name }}-windows
          path: |
            release\WorldClock.exe
            release\WorldClock-${{ github.ref_name }}-windows.zip

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/WorldClock.exe
            release/WorldClock-${{ github.ref_name }}-windows.zip
          generate_release_notes: true
